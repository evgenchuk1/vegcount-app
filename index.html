<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="ירקות">

<title>ספירת ירקות ופירות</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,'Heebo',Arial,sans-serif;
  background:#F0F4F0; direction:rtl;
  min-height:100vh; padding-bottom:50px;
}
.header {
  background:linear-gradient(135deg,#2E7D32 0%,#388E3C 100%);
  color:white; padding:16px 16px 14px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.header-top { display:flex; justify-content:space-between; align-items:center; }
.app-title { font-size:22px; font-weight:700; }
.app-title span { font-size:26px; margin-left:6px; }
.header-date { font-size:12px; opacity:.85; margin-top:2px; }
.btn-clear {
  background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.4);
  color:white; border-radius:20px; padding:6px 14px;
  font-size:13px; cursor:pointer; font-family:inherit;
}
.total-bar {
  background:white; border-bottom:2px solid #C8E6C9;
  padding:10px 16px; display:flex; justify-content:space-between; align-items:center;
}
.total-bar .label { font-size:14px; color:#555; }
.total-bar .count {
  font-size:20px; font-weight:700; color:#2E7D32;
  background:#E8F5E9; border-radius:20px; padding:2px 14px;
  min-width:50px; text-align:center;
}
.section { margin:12px 12px 0; }
.section-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-right:4px; }
.section-header .icon { font-size:18px; }
.section-header .title {
  font-size:15px; font-weight:700; color:#1B5E20;
  text-transform:uppercase; letter-spacing:.04em;
}
.col-head {
  display:grid; grid-template-columns:1fr 90px 56px 68px;
  gap:4px; padding:0 10px 4px;
}
.col-head span { font-size:11px; color:#888; font-weight:600; text-align:center; }
.col-head span:first-child { text-align:right; }

/* ── product row ─────────────────────────────────────── */
.product-row {
  background:white; border:1px solid #E0E0E0; border-radius:12px;
  padding:8px 10px; margin-bottom:6px;
  transition:border-color .2s,background .2s;
}
.product-row.filled { border-color:#66BB6A; background:#F1F8F1; }

.product-top {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:6px;
}
.product-name {
  font-size:16px; font-weight:600; color:#1A1A1A;
  display:flex; align-items:center; gap:5px; flex:1; min-width:0;
}
.product-emoji { font-size:17px; flex-shrink:0; }
.product-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* barcode */
.barcode-section { flex-shrink:0; margin-right:6px; display:flex; flex-direction:column; align-items:center; gap:4px; }
.bc-btn {
  background:none; border:1px solid #ccc; border-radius:5px;
  padding:2px 5px; cursor:pointer; display:flex; align-items:center;
  color:#aaa; transition:all .15s;
}
.bc-btn.active { border-color:#66BB6A; color:#2E7D32; background:#E8F5E9; }
.bc-btn:disabled { cursor:default; opacity:.3; }
.bc-img {
  display:none; max-width:180px; width:100%;
  border:1px solid #ccc; border-radius:5px;
  cursor:pointer; margin-top:2px;
}
.bc-img.visible { display:block; }

/* bottom row: entries | coeff | total */
.product-bottom {
  display:grid; grid-template-columns:1fr 56px 68px;
  gap:4px; align-items:start;
}
.entries-section { display:flex; flex-direction:column; gap:3px; }
.entry-row { display:flex; align-items:center; gap:3px; }
.entry-prefix { font-size:13px; color:#888; min-width:14px; text-align:center; flex-shrink:0; }
.box-input {
  flex:1; min-width:0; border:1px solid #D0D0D0; border-radius:8px;
  padding:7px 4px; font-size:19px; font-weight:700;
  text-align:center; background:#FAFAFA; color:#1A1A1A;
  font-family:inherit; -webkit-appearance:none; appearance:none;
}
.box-input:focus { outline:none; border-color:#2E7D32; background:white; box-shadow:0 0 0 3px rgba(46,125,50,.15); }
.btn-add-loc {
  flex-shrink:0; width:28px; height:34px;
  background:#E8F5E9; border:1px solid #A5D6A7; border-radius:8px;
  color:#2E7D32; font-size:18px; font-weight:700; cursor:pointer; line-height:1;
}
.btn-add-loc:active { background:#C8E6C9; }
.btn-remove-loc {
  flex-shrink:0; width:24px; height:34px;
  background:#FFEBEE; border:1px solid #FFCDD2; border-radius:8px;
  color:#C62828; font-size:16px; font-weight:700; cursor:pointer; line-height:1;
}
.btn-remove-loc:active { background:#FFCDD2; }

.field-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
.field-label { font-size:10px; color:#888; font-weight:600; text-align:center; }
.coeff-input {
  width:100%; border:1px solid #D0D0D0; border-radius:8px;
  padding:7px 3px; font-size:14px; font-weight:600;
  text-align:center; background:#FAFAFA; color:#1A1A1A;
  font-family:inherit; -webkit-appearance:none; appearance:none;
}
.coeff-input:focus { outline:none; border-color:#FF8F00; background:white; }
.total-val-box {
  width:100%; border:1px solid #C8E6C9; border-radius:8px;
  padding:7px 3px; font-size:13px; font-weight:700;
  text-align:center; background:#F1F8E9; color:#2E7D32;
  min-height:34px; display:flex; align-items:center; justify-content:center;
}

/* extras / email / actions */
.extras-card, .email-card, .actions-card {
  background:white; border:1px solid #E0E0E0; border-radius:14px;
  padding:14px 12px; margin:12px 12px 0;
}
.card-title { font-size:15px; font-weight:700; color:#555; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.extra-row { display:grid; grid-template-columns:1fr 80px; gap:6px; margin-bottom:8px; align-items:center; }
.extra-name-input {
  border:1px solid #D0D0D0; border-radius:10px;
  padding:9px 10px; font-size:15px; background:#FAFAFA;
  color:#1A1A1A; font-family:inherit; width:100%; text-align:right;
}
.extra-name-input::placeholder { color:#BBB; font-size:13px; }
.extra-name-input:focus { outline:none; border-color:#2E7D32; background:white; }
.extra-qty-input {
  border:1px solid #D0D0D0; border-radius:10px;
  padding:9px 6px; font-size:17px; font-weight:700;
  text-align:center; background:#FAFAFA; color:#1A1A1A;
  font-family:inherit; -webkit-appearance:none; appearance:none;
  width:100%;
}
.extra-qty-input:focus { outline:none; border-color:#2E7D32; background:white; }
.email-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.email-label { font-size:14px; color:#555; font-weight:600; min-width:58px; }
.email-input {
  flex:1; border:1px solid #D0D0D0; border-radius:10px;
  padding:9px 10px; font-size:14px; background:#FAFAFA;
  color:#1A1A1A; font-family:inherit;
}
.email-input:focus { outline:none; border-color:#2E7D32; background:white; }
.email-input.prefilled { border-color:#81C784; background:#F1FBF1; }
.btn-action {
  display:block; width:100%; background:#2E7D32; color:white;
  border:none; border-radius:12px; padding:16px;
  font-size:17px; font-weight:700; cursor:pointer;
  font-family:inherit; margin-bottom:10px;
  box-shadow:0 3px 10px rgba(46,125,50,.25);
  transition:background .2s, transform .1s;
}
.btn-action:active { transform:scale(.97); background:#1B5E20; }
.btn-action.secondary { background:#1565C0; box-shadow:0 3px 10px rgba(21,101,192,.25); }
.btn-action.secondary:active { background:#0D47A1; }
.btn-action.tertiary { background:#00796B; box-shadow:0 3px 10px rgba(0,121,107,.25); }
.btn-action.tertiary:active { background:#004D40; }
.install-banner {
  background:#FFF8E1; border:1px solid #FFD54F; border-radius:12px;
  margin:12px 12px 0; padding:12px 14px;
  display:flex; gap:10px; align-items:flex-start;

.install-banner .ib-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
.install-banner .ib-text { font-size:13px; color:#5D4037; line-height:1.6; }
.install-banner .ib-text b { color:#E65100; }
.ib-close { background:none; border:none; font-size:18px; color:#999; cursor:pointer; padding:0; margin-right:auto; flex-shrink:0; }
.toast {
  display:none; position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%); background:#1B5E20; color:white;
  padding:14px 22px; border-radius:30px; font-size:15px; font-weight:600;
  z-index:999; max-width:88vw; text-align:center; line-height:1.5;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
</style>
</head>

];

/* ── Row builder ────────────────────────────────────────── */
function makeRow(item) {
  const div = document.createElement('div');
  div.className = 'product-row';
  div.id = 'row-' + item.id;

  const hasBarcode = !!item.barcode;
  const bcBtn = hasBarcode
    ? `<button class="bc-btn active" onclick="toggleBarcode('${item.id}')" title="הצג ברקוד">${BARCODE_SVG}</button>
       <img class="bc-img" id="bc-${item.id}" src="${item.barcode}" onclick="toggleBarcode('${item.id}')" alt="ברקוד">`
    : `<button class="bc-btn" disabled title="אין ברקוד">${BARCODE_SVG}</button>`;

  const coeffVal = item.coeff !== null ? item.coeff : '';

  div.innerHTML = `
    <div class="product-top">
      <div class="product-name">
        <span class="product-emoji">${item.emoji}</span>
        <span class="product-label">${item.name}</span>
      </div>
      <div class="barcode-section">${bcBtn}</div>
    </div>
    <div class="product-bottom">
      <div class="entries-section" id="entries-${item.id}">
        <div class="entry-row">
          <span class="entry-prefix">▪</span>
          <input type="number" class="box-input" data-id="${item.id}"
            placeholder="0" min="0" step="1" inputmode="numeric"
            oninput="calcRow('${item.id}')">
          <button class="btn-add-loc" onclick="addEntry('${item.id}')" title="הוסף מיקום">+</button>
        </div>
      </div>
      <div class="field-wrap">
        <span class="field-label">גורם</span>
        <input type="number" class="coeff-input" id="coeff-${item.id}"
          value="${coeffVal}" placeholder="—" step="0.1" inputmode="decimal"
          oninput="calcRow('${item.id}')">
      </div>
      <div class="field-wrap">
        <span class="field-label">סה"כ</span>
        <div class="total-val-box" id="tot-${item.id}">—</div>
      </div>
    </div>`;
  return div;
}

function buildRows(items, containerId) {
  const c = document.getElementById(containerId);
  items.forEach(item => c.appendChild(makeRow(item)));
}

/* ── Multiple locations ─────────────────────────────────── */
function addEntry(id) {
  const area = document.getElementById('entries-' + id);
  const idx = area.querySelectorAll('.entry-row').length;
  const row = document.createElement('div');
  row.className = 'entry-row';
  row.innerHTML = `
    <span class="entry-prefix" style="color:#888">+</span>
    <input type="number" class="box-input" data-id="${id}"
      placeholder="0" min="0" step="1" inputmode="numeric"
      oninput="calcRow('${id}')">
    <button class="btn-remove-loc" onclick="removeEntry(this,'${id}')" title="הסר">×</button>`;
  area.appendChild(row);
}

function removeEntry(btn, id) {
  btn.closest('.entry-row').remove();
  calcRow(id);
}

/* ── Calculation ─────────────────────────────────────────── */
function calcRow(id) {
  const inputs = document.querySelectorAll(`.box-input[data-id="${id}"]`);
  let totalBoxes = 0;
  inputs.forEach(inp => { totalBoxes += parseFloat(inp.value) || 0; });

  const coeff = parseFloat(document.getElementById('coeff-' + id)?.value) || 0;
  const totalKg = totalBoxes * coeff;

  const totEl = document.getElementById('tot-' + id);
  if (totEl) {
    if (totalBoxes === 0) {
      totEl.textContent = '—';
    } else if (coeff === 0) {
      totEl.textContent = totalBoxes + ' ארגז';
    } else {
      totEl.textContent = totalKg % 1 === 0 ? totalKg : totalKg.toFixed(1);
    }
  }

  const rowEl = document.getElementById('row-' + id);
  if (rowEl) rowEl.classList.toggle('filled', totalBoxes > 0);

  updateTotal();
}

/* ── Barcode toggle ──────────────────────────────────────── */
function toggleBarcode(id) {
  const img = document.getElementById('bc-' + id);
  if (img) img.classList.toggle('visible');
}

/* ── Extras ──────────────────────────────────────────────── */
function buildExtras() {
  const c = document.getElementById('extras-rows');
  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    div.className = 'extra-row';
    div.innerHTML = `
      <input type="text" class="extra-name-input" id="extra-name-${i}" placeholder="שם מוצר ${i+1}">
      <input type="number" class="extra-qty-input" id="extra-qty-${i}"
        placeholder="ק\"ג" min="0" step="0.5" inputmode="decimal" oninput="updateTotal()">`;
    c.appendChild(div);
  }
}

/* ── Total counter ───────────────────────────────────────── */
function updateTotal() {
  let n = 0;
  [...vegetables, ...fruits].forEach(item => {
    const inputs = document.querySelectorAll(`.box-input[data-id="${item.id}"]`);
    let total = 0;
    inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
    if (total > 0) n++;
  });
  for (let i = 0; i < 5; i++) {
    if (parseFloat(document.getElementById('extra-qty-' + i)?.value) || 0) n++;
  }
  document.getElementById('total-count').textContent = n;
}

/* ── Clear all ───────────────────────────────────────────── */
function clearAll() {
  if (!confirm('למחוק את כל הנתונים?')) return;

  [...vegetables, ...fruits].forEach(item => {
    const area = document.getElementById('entries-' + item.id);
    if (area) {
      const rows = area.querySelectorAll('.entry-row');
      rows.forEach((row, i) => {
        if (i === 0) {
          const inp = row.querySelector('.box-input');
          if (inp) inp.value = '';
        } else {
          row.remove();
        }
      });
    }
    const coeffEl = document.getElementById('coeff-' + item.id);
    if (coeffEl) coeffEl.value = item.coeff !== null ? item.coeff : '';
    const totEl = document.getElementById('tot-' + item.id);
    if (totEl) totEl.textContent = '—';
    const rowEl = document.getElementById('row-' + item.id);
    if (rowEl) rowEl.classList.remove('filled');
    const bcImg = document.getElementById('bc-' + item.id);
    if (bcImg) bcImg.classList.remove('visible');
  });

  for (let i = 0; i < 5; i++) {
    const n = document.getElementById('extra-name-' + i);
    const q = document.getElementById('extra-qty-' + i);
    if (n) n.value = '';
    if (q) q.value = '';
  }
  updateTotal();
}

/* ── Data collector ──────────────────────────────────────── */
function getData() {
  const rows = [];
  const processItem = (item, cat) => {
    const inputs = document.querySelectorAll(`.box-input[data-id="${item.id}"]`);
    let totalBoxes = 0;
    const parts = [];
    inputs.forEach(inp => {
      const v = parseFloat(inp.value) || 0;
      if (v > 0) parts.push(v);
      totalBoxes += v;
    });
    if (totalBoxes > 0) {
      const coeff = parseFloat(document.getElementById('coeff-' + item.id)?.value) || 0;
      const totalKg = totalBoxes * coeff;
      rows.push({ cat, name: item.name, boxes: totalBoxes, parts, coeff, totalKg });
    }
  };
  vegetables.forEach(item => processItem(item, 'ירקות'));
  fruits.forEach(item => processItem(item, 'פירות'));
  for (let i = 0; i < 5; i++) {
    const name = (document.getElementById('extra-name-' + i)?.value || '').trim();
    const qty = parseFloat(document.getElementById('extra-qty-' + i)?.value) || 0;
    if (name && qty > 0) rows.push({ cat: 'נוסף', name, boxes: null, parts: [], coeff: null, totalKg: qty });
  }
  return rows;
}

/* ── Report builder ──────────────────────────────────────── */
function buildReportText(rows, dateStr) {
  let txt = 'ספירת ירקות ופירות — ' + dateStr + '\n' + '='.repeat(40) + '\n';
  let lastCat = '';
  rows.forEach(r => {
    if (r.cat !== lastCat) { txt += '\n' + r.cat + ':\n'; lastCat = r.cat; }
    if (r.boxes !== null) {
      const boxStr = r.parts.length > 1 ? r.parts.join(' + ') + ' = ' + r.boxes : r.boxes + '';
      const kgStr = r.coeff ? ' × ' + r.coeff + ' = ' + (r.totalKg % 1 === 0 ? r.totalKg : r.totalKg.toFixed(1)) + ' ק"ג' : ' ארגז (גורם לא ידוע)';
      txt += '  • ' + r.name + ': ' + boxStr + ' ארגז' + kgStr + '\n';
    } else {
      txt += '  • ' + r.name + ': ' + r.totalKg + ' ק"ג\n';
    }
  });
  txt += '\nסה"כ פריטים: ' + rows.length;
  return txt;
}

/* ── Actions ─────────────────────────────────────────────── */
function sendEmail() {
  const rows = getData();
  if (!rows.length) { showToast('לא הוזנו נתונים'); return; }
  const email1 = document.getElementById('email-home').value.trim();
  const email2 = document.getElementById('email-work').value.trim();
  const to = [email1, email2].filter(Boolean).join(',');
  if (!to) { showToast('נא להזין כתובת דוא"ל'); return; }
  const today = new Date().toLocaleDateString('he-IL');
  const subject = encodeURIComponent('ספירת ירקות ופירות — ' + today);
  const body = encodeURIComponent(buildReportText(rows, today));
  window.location.href = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
}

function shareReport() {
  const rows = getData();
  if (!rows.length) { showToast('לא הוזנו נתונים'); return; }
  const today = new Date().toLocaleDateString('he-IL');
  const text = buildReportText(rows, today);
  if (navigator.share) {
    navigator.share({ title: 'ספירת ירקות', text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text)
      .then(() => showToast('הדו"ח הועתק ללוח'))
      .catch(() => showToast('שתף: ' + text.substring(0, 100) + '...'));
  }
}

function downloadCSV() {
  const rows = getData();
  if (!rows.length) { showToast('לא הוזנו נתונים'); return; }
  const today = new Date().toLocaleDateString('he-IL').replace(/\//g, '-');
  let csv = '\uFEFF' + 'קטגוריה,מוצר,ארגזים,גורם אירוז,סה"כ ק"ג\n';
  rows.forEach(r => {
    csv += `${r.cat},${r.name},${r.boxes ?? ''},${r.coeff ?? ''},${r.totalKg}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ספירה_' + today + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('✅ הקובץ הורד!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 5000);
}

/* ── Init ────────────────────────────────────────────────── */
const now = new Date();
document.getElementById('dateStr').textContent =
  now.toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

buildRows(vegetables, 'vegetables-list');
buildRows(fruits, 'fruits-list');
buildExtras();

if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches)
  document.getElementById('installBanner').style.display = 'none';

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
